version: '3.8'

services:
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-svc:
    build:
      context: ./go-grpc-auth-svc
      dockerfile: Dockerfile
    environment:
      - PORT=:50051
      - DB_URL=postgres://root:pass@db:5432/auth_svc
      - JWT_SECRET_KEY=supersecretkey
    ports:
      - "50051:50051"
    depends_on:
      db:
        condition: service_healthy

  product-svc:
    build:
      context: ./go-grpc-product-svc
      dockerfile: Dockerfile
    environment:
      - PORT=:50052
      - DB_URL=postgres://root:pass@db:5432/product_svc
    ports:
      - "50052:50052"
    depends_on:
      db:
        condition: service_healthy

  order-svc:
    build:
      context: ./go-grpc-order-svc
      dockerfile: Dockerfile
    environment:
      - PORT=:50053
      - DB_URL=postgres://root:pass@db:5432/order_svc
      - PRODUCT_SVC_URL=product-svc:50052
    ports:
      - "50053:50053"
    depends_on:
      db:
        condition: service_healthy
      product-svc:
        condition: service_started

  api-gateway:
    build:
      context: ./go-grpc-api-gateway
      dockerfile: Dockerfile
    environment:
      - PORT=:3000
      - AUTH_SVC_URL=auth-svc:50051
      - PRODUCT_SVC_URL=product-svc:50052
      - ORDER_SVC_URL=order-svc:50053
    ports:
      - "3000:3000"
    depends_on:
      - auth-svc
      - product-svc
      - order-svc